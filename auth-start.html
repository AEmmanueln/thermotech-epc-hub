<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signing in…</title>
<!--
  ══════════════════════════════════════════════════════════════════════════
  auth-start.html — REQUIRED for Teams Desktop / Teams Mobile sign-in.

  This is a standalone page, NOT part of the React app. Teams opens it as
  its own small popup window when microsoftTeams.authentication.authenticate()
  is called from sp-storage.js. This page completes the Microsoft sign-in
  INSIDE that popup, then hands the resulting tokens back to the parent
  Teams tab via microsoftTeams.authentication.notifySuccess(...).

  ── CDN FIX (Jul 2026) ─────────────────────────────────────────────────
  The original version loaded MSAL from Microsoft's CDN at alcdn.msauth.net.
  Teams was blocking or failing that script load, causing "ReferenceError:
  msal is not defined" inside this popup — which showed up as
  "[TT] Teams auth popup failed: Could not connect to Teams: …" in the
  parent tab's console, with zero visible error in the popup itself.
  MSAL is now loaded from the app's own domain (./msal-browser.min.js,
  served from GitHub Pages alongside this file) so nothing can block it.

  ── DEPLOYMENT ──────────────────────────────────────────────────────────
  Place these files in:  C:\Users\THERMOTECH\ThermoTechVite\public\
    - auth-start.html       (this file)
    - msal-browser.min.js   (the self-hosted MSAL UMD bundle)
  Vite copies everything in /public/ as-is into the build output, so after
  `npm run build` these will be published at exactly:
    https://aemmanueln.github.io/thermotech-epc-hub/auth-start.html
    https://aemmanueln.github.io/thermotech-epc-hub/msal-browser.min.js
  — which is exactly what SP_CONFIG.authStartUrl in sp-storage.js expects.

  ── ONE-TIME AZURE AD STEP (cannot be done from code) ──────────────────
  This exact URL must be registered as a Redirect URI in Azure AD:
    Azure Portal → App registrations → (this app, clientId
    b360ccdd-d9d5-46dd-b422-862bd2d7ba59) → Authentication →
    Single-page application → Add URI:
      https://aemmanueln.github.io/thermotech-epc-hub/auth-start.html
  Without this registration, sign-in will fail with a redirect_uri_mismatch
  error even though this file is deployed correctly. This is a one-time
  setup step in the Azure Portal, not something fixable from the app code.
  ══════════════════════════════════════════════════════════════════════════
-->
<!-- Self-hosted MSAL — same domain, same GitHub Pages deployment, can't be blocked -->
<script src="./msal-browser.min.js"></script>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background:#0D2147; color:#fff;
         display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
  .box { text-align:center; }
  .spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.25);
             border-top-color:#E8650A; border-radius:50%; margin:0 auto 16px;
             animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color:#ff8080; max-width:360px; font-size:13px; margin-top:10px; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="status">Signing in…</p>
    <p id="err" class="err" style="display:none;"></p>
  </div>

<script>
(function () {
  var CLIENT_ID     = "b360ccdd-d9d5-46dd-b422-862bd2d7ba59";
  var TENANT_ID     = "a91dadb4-c445-449a-b447-f3944db979fb";
  var SELF_URL      = "https://aemmanueln.github.io/thermotech-epc-hub/auth-start.html";
  var SP_SCOPE      = "https://greenak.sharepoint.com/.default";

  function showError(msg) {
    document.getElementById("status").textContent = "Sign-in failed";
    var e = document.getElementById("err");
    e.textContent = msg;
    e.style.display = "block";
    console.error("[auth-start]", msg);
    try { microsoftTeams.authentication.notifyFailure(String(msg)); } catch (_e) {}
  }

  // Guard: if MSAL failed to load (script blocked, 404, etc.), show a
  // visible error instead of dying on the first `msal.` reference.
  if (typeof msal === "undefined") {
    showError("MSAL library failed to load. Check that msal-browser.min.js is deployed alongside auth-start.html.");
    return;
  }

  if (typeof microsoftTeams === "undefined") {
    showError("This page must be opened inside Microsoft Teams.");
    return;
  }

  microsoftTeams.app.initialize().then(function () {
    var msalConfig = {
      auth: {
        clientId: CLIENT_ID,
        authority: "https://login.microsoftonline.com/" + TENANT_ID,
        redirectUri: SELF_URL,
        navigateToLoginRequestUrl: false,
      },
      cache: {
        cacheLocation: "localStorage",
        storeAuthStateInCookie: true,
      },
    };

    var msalInstance = new msal.PublicClientApplication(msalConfig);

    function finishWithAccount(account) {
      document.getElementById("status").textContent = "Finishing sign-in…";
      msalInstance.setActiveAccount(account);
      Promise.all([
        msalInstance.acquireTokenSilent({ scopes: ["User.Read"], account: account }),
        msalInstance.acquireTokenSilent({ scopes: [SP_SCOPE], account: account }),
      ]).then(function (results) {
        var payload = {
          graphToken: results[0].accessToken,
          spToken: results[1].accessToken,
          account: account,
        };
        microsoftTeams.authentication.notifySuccess(JSON.stringify(payload));
      }).catch(function (err) {
        console.warn("[auth-start] Silent token acquisition failed, retrying interactively:", err);
        msalInstance.acquireTokenRedirect({ scopes: [SP_SCOPE], account: account });
      });
    }

    msalInstance.handleRedirectPromise().then(function (response) {
      if (response && response.account) {
        finishWithAccount(response.account);
        return;
      }
      var accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        finishWithAccount(accounts[0]);
      } else {
        document.getElementById("status").textContent = "Redirecting to Microsoft sign-in…";
        msalInstance.loginRedirect({ scopes: ["User.Read"] });
      }
    }).catch(function (err) {
      showError(err && err.errorMessage ? err.errorMessage : String(err));
    });
  }).catch(function (err) {
    showError("Could not connect to Teams: " + String(err));
  });
})();
</script>
</body>
</html>
